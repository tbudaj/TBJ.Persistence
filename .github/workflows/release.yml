name: Release TBJ.Persistence.EfCore

on:
  push:
    tags:
      - 'efcore/v*'

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore and build
        run: |
          dotnet restore
          dotnet build --no-restore --configuration Release

      - name: Pack
        run: dotnet pack src/TBJ.Persistence.EfCore/TBJ.Persistence.EfCore.csproj --no-build --configuration Release --output ./artifacts

      - name: NuGet login (Trusted Publishing — OIDC)
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet.org
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Push to GitHub Packages
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.GITHUB_TOKEN }} --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/*.nupkg
          generate_release_notes: true

      - name: Create release branch
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          prefix="${tag%%/v*}"
          version="${tag#*/v}"
          branch="release/${prefix}/${version}"
          echo "Creating release branch: $branch"
          gh api "repos/${{ github.repository }}/git/refs" -f ref="refs/heads/$branch" -f sha="${{ github.sha }}"
